<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Trang Trại Thông Minh</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            background-image: url('https://png.pngtree.com/background/20250523/original/pngtree-wheat-field-at-sunset-showing-scenic-nature-painting-with-golden-light-picture-image_16573542.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        h1 { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; text-align: center; }

        #clock { 
            font-size: 18px; 
            margin-bottom: 30px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .container { 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .card { 
            background: rgba(10, 125, 196, 0.85); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-align: center; 
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
            flex: 1 1 150px; 
            max-width: 200px;
        }

        .card:hover { transform: translateY(-5px); }

        .value { font-size: 24px; font-weight: bold; color: #ffffff; margin-top: 10px; }
        .label { color: #e0e0e0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 480px) {
            h1 { font-size: 20px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

    <h1>Giám sát Trang trại Thông minh</h1>
    <div id="clock">Đang tải thời gian...</div>
    
    <div class="container">
        <div class="card">
            <div class="label">Nhiệt độ</div>
            <div class="value" id="temp">28.5 °C</div>
        </div>
        <div class="card">
            <div class="label">Độ ẩm không khí</div>
            <div class="value" id="humi">60 %</div>
        </div>
        <div class="card">
            <div class="label">Độ ẩm đất</div>
            <div class="value" id="soil">45 %</div>
        </div>
        <div class="card">
            <div class="label">Ánh sáng</div>
            <div class="value" id="light">800 Lux</div>
        </div>
        <div class="card">
            <div class="label">Trạng thái mưa</div>
            <div class="value" id="rain">Không</div>
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('vi-VN', options);
            const timeString = now.toLocaleTimeString('vi-VN');
            document.getElementById('clock').innerHTML = dateString + " | " + timeString;
        }
        
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>

</body>
</html>
